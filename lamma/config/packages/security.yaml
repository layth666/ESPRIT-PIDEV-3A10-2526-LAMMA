security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'plaintext'
    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_user_provider

            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true

            logout:
                path: app_logout
                # where to redirect after logout
                target: app_home

    # Easy way to control access for large sections of your site
    access_control:
         - { path: ^/admin, roles: ROLE_ADMIN }
         - { path: ^/login, roles: PUBLIC_ACCESS }
         
         # ==========================================
         # 1. CATALOGUE ADMIN (Évènements, Restos...)
         # ==========================================
         - { path: ^/(evenement|restaurant|menu|repas|ingredient), roles: ROLE_ADMIN, methods: [POST, PUT, DELETE, PATCH] }
         - { path: ^/(evenement|restaurant|menu|repas|ingredient)/(new|.*/edit), roles: ROLE_ADMIN }
         - { path: ^/(evenement|restaurant|menu|repas|ingredient), roles: ROLE_USER }

         # ==========================================
         # 2. ACTIONS UTILISATEUR (Abo, participations)
         # ==========================================
         - { path: ^/(participation|abonnement|ticket), roles: ROLE_USER, methods: [POST, PUT, DELETE, PATCH] }
         - { path: ^/(participation|abonnement|ticket)/(new|.*/edit), roles: ROLE_USER }
         - { path: ^/(participation|abonnement|ticket), roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
